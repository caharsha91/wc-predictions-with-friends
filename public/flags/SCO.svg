  </g>
  <rect x="1" y="1" width="94" height="62" rx="10" fill="none" stroke="rgba(148,163,184,0.58)" stroke-width="1.5"/>
  <text x="48" y="56" text-anchor="middle" font-size="17" font-weight="700" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" letter-spacing="0.8">SCO</text>
